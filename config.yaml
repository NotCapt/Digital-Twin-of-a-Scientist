# ============================================
# Digital Twin of Alan Turing — Configuration
# ============================================

llm:
  model: "gemini-2.5-flash"
  temperature: 0.7
  max_output_tokens: 2048
  top_p: 0.95

rag:
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5
  embedding_model: "all-MiniLM-L6-v2"
  boost_primary_source: 1.3    # Multiplier for Turing's own words
  collection_name: "turing_knowledge"

memory:
  sliding_window_size: 10
  max_long_term_results: 3
  consolidation_threshold: 20
  episodic_collection: "episodic_memory"
  semantic_collection: "semantic_memory"
  important_collection: "important_moments"

timeline:
  birth_year: 1912
  death_year: 1954

storage:
  chroma_persist_dir: "storage/chroma_db"
  sqlite_path: "storage/sessions.db"

gradio:
  title: "Digital Twin of Alan Turing"
  description: "An AI agent that emulates Alan Turing's knowledge, reasoning style, and communication patterns."
  server_port: 7860
  theme: "soft"
